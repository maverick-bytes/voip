<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoIP Control Panel — UniFi OS</title>
    <meta name="description" content="Web UI for managing the voipd VoIP daemon on UniFi OS. Configure VLAN, routing, SIP proxy and monitor service state." />
    <meta name="application-name" content="VoIP Control Panel" />

    <!-- Favicon: blue rounded square with phone icon, matching the app sidebar logo -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" sizes="any" />

    <meta property="og:title" content="VoIP Control Panel — UniFi OS" />
    <meta property="og:description" content="Web UI for managing the voipd VoIP daemon on UniFi OS." />
    <meta property="og:type" content="website" />

    <!-- Apply saved theme synchronously before first paint to avoid white flash.
         Must be a blocking (non-module) script so it runs before CSS is applied. -->
    <script>
      (function () {
        var saved = localStorage.getItem("voip-theme");
        var dark = saved ? saved === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
